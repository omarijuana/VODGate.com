<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">VODGate social preview</title>
  <desc id="desc">VODGate premium IPTV and VOD access social preview image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f" />
      <stop offset="0.55" stop-color="#111a33" />
      <stop offset="1" stop-color="#1f1235" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1000" cy="120" r="180" fill="#7c3aed" opacity="0.22" filter="url(#glow)" />
  <circle cx="160" cy="520" r="220" fill="#14b8a6" opacity="0.18" filter="url(#glow)" />
  <rect x="96" y="92" width="1008" height="446" rx="44" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)" />
  <rect x="152" y="148" width="164" height="164" rx="42" fill="url(#accent)" />
  <text x="234" y="251" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="800" fill="#ffffff">VG</text>
  <text x="364" y="226" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="800" fill="#ffffff">VODGate</text>
  <text x="364" y="302" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600" fill="#d9e7ff">Premium IPTV &amp; VOD Access</text>
  <text x="364" y="370" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#aebdda">Fast activation • 4K ready • WhatsApp support</text>
  <rect x="152" y="420" width="252" height="58" rx="29" fill="url(#accent)" />
  <text x="278" y="458" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">vodgate.com</text>
