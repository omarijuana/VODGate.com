<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" role="img" aria-label="VODGate VG favicon">
  <defs>
    <linearGradient id="vodgate-brand-gradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e50914" />
      <stop offset="1" stop-color="#ff4b55" />
    </linearGradient>
    <filter id="vodgate-brand-shadow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#e50914" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="40" height="40" rx="14.4" fill="url(#vodgate-brand-gradient)" filter="url(#vodgate-brand-shadow)" />
  <text x="20" y="20" fill="#ffffff" dominant-baseline="central" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800" letter-spacing="-0.6" text-anchor="middle">VG</text>
</svg>
